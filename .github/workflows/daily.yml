name: Daily PR Monitor Update

on:
  schedule:
    - cron: "0 1 * * *"   # 1am UTC = 9am CST daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout repo ──────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────
      - name: Install dependencies
        run: pip install jinja2

      # ── 4. Run monitor ────────────────────────────
      - name: Run
        run: python run.py

      # ── 5. Commit updated data ────────────────────
      # Only commits if data actually changed
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json data/latest.json data/last_week_sov.json index.html
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push          

      # ── 6. Deploy to GitHub Pages ─────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
