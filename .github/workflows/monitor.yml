name: Bitget PR Monitor

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monitor
        env:
          MELTWATER_API_KEY: ${{ secrets.MELTWATER_API_KEY }}
        run: python run.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html data/
          git commit -m "Auto-update $(date -u)" || echo "No changes"
          git push          
