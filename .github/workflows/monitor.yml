name: Bitget PR Monitor

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix indentation
        run: python -c "content = open('run.py').read(); content = content.expandtabs(4); open('run.py', 'w').write(content)"

      - name: Fix and run
        env:
          MELTWATER_API_KEY: ${{ secrets.MELTWATER_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        run: |
          python -c "content = open('run.py').read(); content = content.expandtabs(4); open('run.py', 'w').write(content)"
          python run.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html data/
          git commit -m "Auto-update $(date -u)" || echo "No changes"
          git push          
